name: Trustwell
description: >-
  Trustwell is a food industry software company formed from the merger of ESHA Research
  and FoodLogiQ in 2023, providing the food and beverage industry with an integrated
  platform covering product formulation, nutrition labeling, regulatory compliance,
  supply chain management, traceability, quality assurance, and recall management.
  The Trustwell Connect Platform offers two primary APIs: the Genesis Foods GraphQL API
  for nutrition analysis, food formulation, and label generation (with support for
  US, Canadian, EU, Mexican, and Australian regulatory standards), and the FoodLogiQ
  API for supply chain visibility, compliance management, supplier relationships,
  and FSMA 204-compliant traceability. Both APIs require X-API-KEY authentication.
  The platform serves food manufacturers, retailers, restaurants, and distributors
  across the global food supply chain.
