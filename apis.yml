apis:
  - aid: trustwell:trustwell-genesis-foods-graphql-api
    name: Trustwell Genesis Foods GraphQL API
    tags:
      - Food Formulation
      - Nutrition Labeling
      - Regulatory Compliance
      - Food Industry
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.trustwell.com/genesis
    humanURL: https://docs.trustwell.com/genesis/api/
    properties:
      - url: https://docs.trustwell.com/genesis/api/
        type: Documentation
      - url: https://www.trustwell.com/products/genesis/food-formulation-and-labeling/
        type: Documentation
    description: >-
      The Trustwell Genesis Foods GraphQL API provides programmatic access to food
      formulation, nutrition analysis, and label generation capabilities. The GraphQL
      endpoint at api.trustwell.com/genesis supports 16 query types (foods, labels,
      nutrients, allergens, products, suppliers, regulations, documents, and more),
      6 mutation categories (foods with 50+ sub-operations, label, documents, products,
      suppliers, tags), and 2 subscription types (documentEvents, tenantEvents) for
      real-time monitoring. The API supports 600+ schema types covering US, Canadian,
      EU, Mexican, and Australian/New Zealand regulatory standards for nutrition labeling.
      Authentication uses the X-API-KEY header. The API connects nutrition analysis data
      to ERP, PLM, POS, and website systems.
  - aid: trustwell:trustwell-foodlogiq-api
    name: Trustwell FoodLogiQ API
    tags:
      - Food Safety
      - Supply Chain
      - Traceability
      - Compliance
      - Quality Management
      - Recall Management
      - Food Industry
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.trustwell.com/foodlogiq
    humanURL: https://www.trustwell.com/products/foodlogiq/
    properties:
      - url: https://www.trustwell.com/products/foodlogiq/
        type: Documentation
      - url: https://www.trustwell.com/products/foodlogiq/product-management/
        type: Documentation
      - url: https://raw.githubusercontent.com/api-evangelist/trustwell/refs/heads/main/openapi/trustwell-foodlogiq-openapi.yml
        type: OpenAPI
    description: >-
      The Trustwell FoodLogiQ API is an open REST API that enables enterprise food
      brands to integrate supply chain data with their existing systems. The API supports
      supplier relationship management, compliance documentation, quality incident
      management, product specification management, FSMA 204-compliant traceability
      (farm-to-fork tracking), and recall management workflows. The Q3 2025 release
      introduced role-based API tokens with scoped permissions for fine-grained access
      control. The API is documented within the FoodLogiQ Connect platform Resource
      Center and supports integration with ERP, WMS, and third-party food safety systems.
  - aid: trustwell:trustwell-genesis-supplements-api
    name: Trustwell Genesis Supplements API
    tags:
      - Supplement Formulation
      - Nutrition Labeling
      - Regulatory Compliance
      - Food Industry
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.trustwell.com/genesis
    humanURL: https://www.trustwell.com/products/genesis/
    properties:
      - url: https://www.trustwell.com/products/genesis/
        type: Documentation
      - url: https://docs.trustwell.com/genesis/api/
        type: Documentation
    description: >-
      The Trustwell Genesis Supplements API provides formulation and regulatory
      compliance capabilities for dietary supplement manufacturers. Built on the same
      Genesis Foods GraphQL endpoint, it supports Supplement Facts label generation,
      ingredient declaration, allergen statements, and compliance with FDA dietary
      supplement regulations. The API enables integration of supplement formulation
      data into ERP and PLM systems.
