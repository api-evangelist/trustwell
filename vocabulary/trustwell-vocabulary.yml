vocabulary:
  - term: Genesis Foods
    definition: >-
      Trustwell's food formulation and nutrition analysis platform, providing a
      GraphQL API for querying food items, nutrient data, allergen declarations,
      label generation, and regulatory standards.
    tags:
      - Food Formulation
      - Nutrition Analysis
      - GraphQL

  - term: FoodLogiQ
    definition: >-
      Trustwell's supply chain management and food safety platform, providing REST
      APIs for supplier management, quality incident tracking, FSMA 204 traceability,
      and recall management.
    tags:
      - Supply Chain
      - Food Safety
      - Traceability

  - term: GraphQL
    definition: >-
      Query language and runtime for APIs used by Genesis Foods, allowing clients
      to request exactly the fields they need for food formulation data, nutrients,
      allergens, labels, and regulations in a single POST request.
    tags:
      - API Design
      - Genesis Foods

  - term: FSMA 204
    definition: >-
      The Food Safety Modernization Act Section 204 traceability rule requiring food
      manufacturers and distributors to maintain lot-level records from farm to fork
      for foods on the Food Traceability List (FTL), effective January 2026.
    tags:
      - Compliance
      - Traceability
      - Regulatory

  - term: Traceability Lot
    definition: >-
      A FoodLogiQ record representing a specific batch or lot of food product tracked
      through the supply chain for FSMA 204 compliance, capturing production date,
      quantity, origin, and chain-of-custody data.
    tags:
      - Traceability
      - FSMA 204
      - Supply Chain

  - term: Quality Incident
    definition: >-
      A reported food quality or safety issue in FoodLogiQ, categorized by severity
      (critical, major, minor) and type (allergen, contamination, labeling, packaging,
      foreign material, pathogen, process deviation, supplier issue).
    tags:
      - Quality Management
      - Food Safety

  - term: Recall
    definition: >-
      A formal food product recall or withdrawal event in FoodLogiQ. Types include
      voluntary (company-initiated), mock (practice drill), regulatory (FDA/USDA-mandated),
      and market withdrawal for products with minor defects.
    tags:
      - Recall Management
      - Food Safety

  - term: Recall Classification
    definition: >-
      FDA classification system for food recalls. Class I indicates a health hazard
      with reasonable probability of causing serious adverse health consequences.
      Class II poses a remote probability of adverse effects. Class III is unlikely
      to cause adverse health consequences.
    tags:
      - Recall Management
      - Regulatory
      - FDA

  - term: Nutrition Label
    definition: >-
      A regulatory-compliant nutrition facts panel generated by Genesis Foods for a
      food product. Supported formats include US (FDA Nutrition Facts), CA (Canadian
      Nutrition Facts), EU (EU Nutrition Declaration), MX (Mexican NOM-051), and
      AU (Australian Nutrition Information Panel).
    tags:
      - Nutrition Labeling
      - Regulatory Compliance

  - term: Daily Value
    definition: >-
      The percent daily value (%DV) shown on a nutrition facts label, indicating
      how much a nutrient in a serving of food contributes to a daily diet based
      on a 2000-calorie reference. Defined by FDA for US labeling.
    tags:
      - Nutrition Labeling
      - FDA

  - term: Allergen Declaration
    definition: >-
      A statement on a food label indicating the presence or potential presence of
      a major food allergen. In the US, the 9 major allergens are milk, eggs, fish,
      shellfish, tree nuts, peanuts, wheat, soybeans, and sesame.
    tags:
      - Allergen Management
      - Food Labeling
      - Compliance

  - term: Supplier Compliance
    definition: >-
      The process of verifying and maintaining supplier food safety certifications
      and standards (such as SQF, BRC, GFSI) within the FoodLogiQ platform to
      meet regulatory and buyer requirements.
    tags:
      - Supply Chain
      - Compliance
      - Quality Management

  - term: SQF
    definition: >-
      Safe Quality Food certification program, a GFSI-recognized food safety and
      quality management system standard used to certify food manufacturers and
      suppliers at multiple levels of food safety and quality.
    tags:
      - Certification
      - Compliance
      - Supplier Management

  - term: BRC
    definition: >-
      British Retail Consortium Global Standard for Food Safety, a GFSI-recognized
      certification standard widely used by food manufacturers supplying retail
      chains globally.
    tags:
      - Certification
      - Compliance
      - Supplier Management

  - term: GFSI
    definition: >-
      Global Food Safety Initiative, a business-driven initiative for the continuous
      improvement of food safety management systems. GFSI recognizes food safety
      standards including SQF, BRC, IFS, FSSC 22000, and others.
    tags:
      - Certification
      - Compliance
      - Food Safety

  - term: Food Traceability List
    definition: >-
      The FDA list of high-risk foods subject to FSMA 204 enhanced traceability
      requirements, including leafy greens, shell eggs, fresh herbs, melons, peppers,
      cucumbers, tomatoes, tropical tree fruits, and nut butters.
    tags:
      - Traceability
      - FSMA 204
      - Regulatory
