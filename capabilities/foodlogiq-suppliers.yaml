naftiko: 1.0.0-alpha2
info:
  label: Trustwell FoodLogiQ API — Suppliers
  description: 'Trustwell FoodLogiQ API — Suppliers. 4 operations. Lead operation: List Suppliers. Self-contained Naftiko
    capability covering one Trustwell business surface.'
  tags:
  - Trustwell
  - Suppliers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRUSTWELL_API_KEY: TRUSTWELL_API_KEY
capability:
  consumes:
  - type: http
    namespace: foodlogiq-suppliers
    baseUri: https://api.trustwell.com/foodlogiq/v1
    description: Trustwell FoodLogiQ API — Suppliers business capability. Self-contained, no shared references.
    resources:
    - name: suppliers
      path: /suppliers
      operations:
      - name: listsuppliers
        method: GET
        description: List Suppliers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
        - name: page
          in: query
          type: integer
        - name: perPage
          in: query
          type: integer
      - name: createsupplier
        method: POST
        description: Create Supplier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: suppliers-supplierId
      path: /suppliers/{supplierId}
      operations:
      - name: getsupplier
        method: GET
        description: Get Supplier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: supplierId
          in: path
          type: string
          required: true
      - name: updatesupplier
        method: PUT
        description: Update Supplier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: supplierId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.TRUSTWELL_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: foodlogiq-suppliers-rest
    port: 8080
    description: REST adapter for Trustwell FoodLogiQ API — Suppliers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/suppliers
      name: suppliers
      description: REST surface for suppliers.
      operations:
      - method: GET
        name: listsuppliers
        description: List Suppliers
        call: foodlogiq-suppliers.listsuppliers
        with:
          status: rest.status
          page: rest.page
          perPage: rest.perPage
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsupplier
        description: Create Supplier
        call: foodlogiq-suppliers.createsupplier
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/suppliers/{supplierid}
      name: suppliers-supplierid
      description: REST surface for suppliers-supplierId.
      operations:
      - method: GET
        name: getsupplier
        description: Get Supplier
        call: foodlogiq-suppliers.getsupplier
        with:
          supplierId: rest.supplierId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesupplier
        description: Update Supplier
        call: foodlogiq-suppliers.updatesupplier
        with:
          supplierId: rest.supplierId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: foodlogiq-suppliers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Trustwell FoodLogiQ API — Suppliers. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-suppliers
      description: List Suppliers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: foodlogiq-suppliers.listsuppliers
      with:
        status: tools.status
        page: tools.page
        perPage: tools.perPage
      outputParameters:
      - type: object
        mapping: $.
    - name: create-supplier
      description: Create Supplier
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: foodlogiq-suppliers.createsupplier
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-supplier
      description: Get Supplier
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: foodlogiq-suppliers.getsupplier
      with:
        supplierId: tools.supplierId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-supplier
      description: Update Supplier
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: foodlogiq-suppliers.updatesupplier
      with:
        supplierId: tools.supplierId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
