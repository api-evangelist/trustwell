naftiko: 1.0.0-alpha2
info:
  label: Trustwell FoodLogiQ API — Recalls
  description: 'Trustwell FoodLogiQ API — Recalls. 3 operations. Lead operation: List Recalls. Self-contained Naftiko capability
    covering one Trustwell business surface.'
  tags:
  - Trustwell
  - Recalls
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRUSTWELL_API_KEY: TRUSTWELL_API_KEY
capability:
  consumes:
  - type: http
    namespace: foodlogiq-recalls
    baseUri: https://api.trustwell.com/foodlogiq/v1
    description: Trustwell FoodLogiQ API — Recalls business capability. Self-contained, no shared references.
    resources:
    - name: recalls
      path: /recalls
      operations:
      - name: listrecalls
        method: GET
        description: List Recalls
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
        - name: page
          in: query
          type: integer
        - name: perPage
          in: query
          type: integer
      - name: createrecall
        method: POST
        description: Create Recall
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: recalls-recallId
      path: /recalls/{recallId}
      operations:
      - name: getrecall
        method: GET
        description: Get Recall
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: recallId
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.TRUSTWELL_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: foodlogiq-recalls-rest
    port: 8080
    description: REST adapter for Trustwell FoodLogiQ API — Recalls. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/recalls
      name: recalls
      description: REST surface for recalls.
      operations:
      - method: GET
        name: listrecalls
        description: List Recalls
        call: foodlogiq-recalls.listrecalls
        with:
          status: rest.status
          page: rest.page
          perPage: rest.perPage
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createrecall
        description: Create Recall
        call: foodlogiq-recalls.createrecall
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/recalls/{recallid}
      name: recalls-recallid
      description: REST surface for recalls-recallId.
      operations:
      - method: GET
        name: getrecall
        description: Get Recall
        call: foodlogiq-recalls.getrecall
        with:
          recallId: rest.recallId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: foodlogiq-recalls-mcp
    port: 9090
    transport: http
    description: MCP adapter for Trustwell FoodLogiQ API — Recalls. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-recalls
      description: List Recalls
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: foodlogiq-recalls.listrecalls
      with:
        status: tools.status
        page: tools.page
        perPage: tools.perPage
      outputParameters:
      - type: object
        mapping: $.
    - name: create-recall
      description: Create Recall
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: foodlogiq-recalls.createrecall
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-recall
      description: Get Recall
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: foodlogiq-recalls.getrecall
      with:
        recallId: tools.recallId
      outputParameters:
      - type: object
        mapping: $.
