naftiko: 1.0.0-alpha2
info:
  label: Trustwell Food Safety Management
  description: Unified food safety management capability combining Genesis Foods nutrition analysis and FoodLogiQ supply chain
    operations. Used by food manufacturers, quality managers, and regulatory compliance teams to formulate products, generate
    nutrition labels, manage supplier compliance, track quality incidents, maintain FSMA 204-compliant traceability records,
    and manage recall events from a single integrated platform.
  tags:
  - Food Safety
  - Supply Chain
  - Food Formulation
  - Nutrition Labeling
  - Traceability
  - Compliance
  - Quality Management
  - Recall Management
  - Food Industry
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    TRUSTWELL_API_KEY: TRUSTWELL_API_KEY
capability:
  consumes:
  - type: http
    namespace: trustwell-genesis
    baseUri: https://api.trustwell.com/genesis
    description: Genesis Foods GraphQL API for food formulation and labeling.
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{TRUSTWELL_API_KEY}}'
      placement: header
    resources:
    - name: foods
      path: /
      description: Food formulation and analysis via GraphQL
      operations:
      - name: query-foods
        method: POST
        description: Query food items with nutrients, allergens, and label data.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{{tools.query}}'
            variables: '{{tools.variables}}'
      - name: query-nutrients
        method: POST
        description: Query standard and custom nutrient definitions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{ nutrients { id name unit } }'
      - name: query-allergens
        method: POST
        description: Query allergen data and standard allergens.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{ allergens { id name } }'
      - name: query-labels
        method: POST
        description: Query label information and generate label images.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{{tools.labelQuery}}'
            variables: '{{tools.variables}}'
      - name: query-regulations
        method: POST
        description: Query regulatory data, authorities, and nutrition claims.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            query: '{ regulations { id name authority country } }'
  - type: http
    namespace: trustwell-foodlogiq
    baseUri: https://api.trustwell.com/foodlogiq/v1
    description: FoodLogiQ supply chain and food safety API.
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{TRUSTWELL_API_KEY}}'
      placement: header
    resources:
    - name: suppliers
      path: /suppliers
      description: Supplier management
      operations:
      - name: list-suppliers
        method: GET
        description: List suppliers in the supply chain network.
        inputParameters:
        - name: status
          in: query
          type: string
          required: false
        - name: page
          in: query
          type: integer
          required: false
        - name: perPage
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-supplier
        method: POST
        description: Add a new supplier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            email: '{{tools.email}}'
    - name: quality-incidents
      path: /quality/incidents
      description: Quality incident management
      operations:
      - name: list-quality-incidents
        method: GET
        description: List quality incidents with status and severity filtering.
        inputParameters:
        - name: status
          in: query
          type: string
          required: false
        - name: severity
          in: query
          type: string
          required: false
        - name: page
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-quality-incident
        method: POST
        description: Create a new quality incident report.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            title: '{{tools.title}}'
            severity: '{{tools.severity}}'
    - name: traceability-lots
      path: /traceability/lots
      description: FSMA 204 traceability lot records
      operations:
      - name: list-lots
        method: GET
        description: List traceability lot records for FSMA 204 compliance.
        inputParameters:
        - name: productId
          in: query
          type: string
          required: false
        - name: fromDate
          in: query
          type: string
          required: false
        - name: toDate
          in: query
          type: string
          required: false
        - name: page
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: recalls
      path: /recalls
      description: Recall and withdrawal management
      operations:
      - name: list-recalls
        method: GET
        description: List recall and withdrawal events.
        inputParameters:
        - name: status
          in: query
          type: string
          required: false
        - name: page
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-recall
        method: POST
        description: Initiate a new recall or withdrawal event.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            title: '{{tools.title}}'
            reason: '{{tools.reason}}'
            recallType: '{{tools.recallType}}'
  exposes:
  - type: rest
    port: 8080
    namespace: trustwell-food-safety-api
    description: Unified REST API for food formulation, nutrition labeling, supply chain, and food safety management.
    resources:
    - path: /v1/foods/query
      name: foods
      description: Food formulation queries
      operations:
      - method: POST
        name: query-foods
        description: Query food formulation data including nutrients and allergens.
        call: trustwell-genesis.query-foods
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/nutrients
      name: nutrients
      description: Nutrient definitions
      operations:
      - method: GET
        name: query-nutrients
        description: Get nutrient definitions.
        call: trustwell-genesis.query-nutrients
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/allergens
      name: allergens
      description: Allergen definitions
      operations:
      - method: GET
        name: query-allergens
        description: Get allergen definitions.
        call: trustwell-genesis.query-allergens
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/regulations
      name: regulations
      description: Regulatory standards
      operations:
      - method: GET
        name: query-regulations
        description: Get regulatory standards by country.
        call: trustwell-genesis.query-regulations
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/suppliers
      name: suppliers
      description: Supply chain suppliers
      operations:
      - method: GET
        name: list-suppliers
        description: List supply chain suppliers.
        call: trustwell-foodlogiq.list-suppliers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/quality/incidents
      name: quality-incidents
      description: Quality incidents
      operations:
      - method: GET
        name: list-quality-incidents
        description: List quality incidents.
        call: trustwell-foodlogiq.list-quality-incidents
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-quality-incident
        description: Create quality incident.
        call: trustwell-foodlogiq.create-quality-incident
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/traceability/lots
      name: lots
      description: FSMA 204 traceability lots
      operations:
      - method: GET
        name: list-lots
        description: List traceability lot records.
        call: trustwell-foodlogiq.list-lots
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/recalls
      name: recalls
      description: Recall events
      operations:
      - method: GET
        name: list-recalls
        description: List recall events.
        call: trustwell-foodlogiq.list-recalls
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-recall
        description: Create recall event.
        call: trustwell-foodlogiq.create-recall
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: trustwell-food-safety-mcp
    transport: http
    description: MCP server for AI-assisted food formulation, nutrition compliance, supply chain monitoring, and food safety
      management.
    tools:
    - name: query-foods
      description: Query food formulation data including nutrient content, allergen declarations, and label information from
        Genesis Foods.
      hints:
        readOnly: true
        openWorld: false
      call: trustwell-genesis.query-foods
      with:
        query: tools.query
        variables: tools.variables
      outputParameters:
      - type: object
        mapping: $.
    - name: query-nutrients
      description: Get all standard and custom nutrient definitions from Genesis Foods.
      hints:
        readOnly: true
        openWorld: false
      call: trustwell-genesis.query-nutrients
      outputParameters:
      - type: object
        mapping: $.
    - name: query-allergens
      description: Get all allergen definitions for allergen declaration and labeling compliance.
      hints:
        readOnly: true
        openWorld: false
      call: trustwell-genesis.query-allergens
      outputParameters:
      - type: object
        mapping: $.
    - name: query-labels
      description: Generate and retrieve nutrition label images for US, Canadian, EU, Mexican, and Australian regulatory formats.
      hints:
        readOnly: true
        openWorld: false
      call: trustwell-genesis.query-labels
      with:
        labelQuery: tools.labelQuery
        variables: tools.variables
      outputParameters:
      - type: object
        mapping: $.
    - name: query-regulations
      description: Get regulatory standards, nutrition claims, and labeling requirements by country and regulatory authority.
      hints:
        readOnly: true
        openWorld: false
      call: trustwell-genesis.query-regulations
      outputParameters:
      - type: object
        mapping: $.
    - name: list-suppliers
      description: List food supply chain suppliers with status and compliance information.
      hints:
        readOnly: true
        openWorld: false
      call: trustwell-foodlogiq.list-suppliers
      with:
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: create-supplier
      description: Add a new supplier to the FoodLogiQ supply chain network.
      hints:
        readOnly: false
        openWorld: false
      call: trustwell-foodlogiq.create-supplier
      with:
        name: tools.name
        email: tools.email
      outputParameters:
      - type: object
        mapping: $.
    - name: list-quality-incidents
      description: List food quality incidents with severity and status filtering for quality monitoring.
      hints:
        readOnly: true
        openWorld: false
      call: trustwell-foodlogiq.list-quality-incidents
      with:
        status: tools.status
        severity: tools.severity
      outputParameters:
      - type: object
        mapping: $.
    - name: create-quality-incident
      description: Create a food quality incident report for a supplier or product safety issue.
      hints:
        readOnly: false
        openWorld: false
      call: trustwell-foodlogiq.create-quality-incident
      with:
        title: tools.title
        severity: tools.severity
      outputParameters:
      - type: object
        mapping: $.
    - name: list-lots
      description: List FSMA 204-compliant traceability lot records for farm-to-fork supply chain tracking.
      hints:
        readOnly: true
        openWorld: false
      call: trustwell-foodlogiq.list-lots
      with:
        productId: tools.productId
        fromDate: tools.fromDate
        toDate: tools.toDate
      outputParameters:
      - type: object
        mapping: $.
    - name: list-recalls
      description: List food recall and withdrawal events with status filtering.
      hints:
        readOnly: true
        openWorld: false
      call: trustwell-foodlogiq.list-recalls
      with:
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: create-recall
      description: Initiate a food product recall or withdrawal event (voluntary, mock, or regulatory).
      hints:
        readOnly: false
        destructive: false
        openWorld: false
      call: trustwell-foodlogiq.create-recall
      with:
        title: tools.title
        reason: tools.reason
        recallType: tools.recallType
      outputParameters:
      - type: object
        mapping: $.
