naftiko: 1.0.0-alpha2
info:
  label: Trustwell FoodLogiQ API — Quality
  description: 'Trustwell FoodLogiQ API — Quality. 3 operations. Lead operation: List Quality Incidents. Self-contained Naftiko
    capability covering one Trustwell business surface.'
  tags:
  - Trustwell
  - Quality
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRUSTWELL_API_KEY: TRUSTWELL_API_KEY
capability:
  consumes:
  - type: http
    namespace: foodlogiq-quality
    baseUri: https://api.trustwell.com/foodlogiq/v1
    description: Trustwell FoodLogiQ API — Quality business capability. Self-contained, no shared references.
    resources:
    - name: quality-incidents
      path: /quality/incidents
      operations:
      - name: listqualityincidents
        method: GET
        description: List Quality Incidents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
        - name: severity
          in: query
          type: string
        - name: supplierId
          in: query
          type: string
        - name: page
          in: query
          type: integer
        - name: perPage
          in: query
          type: integer
      - name: createqualityincident
        method: POST
        description: Create Quality Incident
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: quality-incidents-incidentId
      path: /quality/incidents/{incidentId}
      operations:
      - name: getqualityincident
        method: GET
        description: Get Quality Incident
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: incidentId
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.TRUSTWELL_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: foodlogiq-quality-rest
    port: 8080
    description: REST adapter for Trustwell FoodLogiQ API — Quality. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/quality/incidents
      name: quality-incidents
      description: REST surface for quality-incidents.
      operations:
      - method: GET
        name: listqualityincidents
        description: List Quality Incidents
        call: foodlogiq-quality.listqualityincidents
        with:
          status: rest.status
          severity: rest.severity
          supplierId: rest.supplierId
          page: rest.page
          perPage: rest.perPage
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createqualityincident
        description: Create Quality Incident
        call: foodlogiq-quality.createqualityincident
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/quality/incidents/{incidentid}
      name: quality-incidents-incidentid
      description: REST surface for quality-incidents-incidentId.
      operations:
      - method: GET
        name: getqualityincident
        description: Get Quality Incident
        call: foodlogiq-quality.getqualityincident
        with:
          incidentId: rest.incidentId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: foodlogiq-quality-mcp
    port: 9090
    transport: http
    description: MCP adapter for Trustwell FoodLogiQ API — Quality. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-quality-incidents
      description: List Quality Incidents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: foodlogiq-quality.listqualityincidents
      with:
        status: tools.status
        severity: tools.severity
        supplierId: tools.supplierId
        page: tools.page
        perPage: tools.perPage
      outputParameters:
      - type: object
        mapping: $.
    - name: create-quality-incident
      description: Create Quality Incident
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: foodlogiq-quality.createqualityincident
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-quality-incident
      description: Get Quality Incident
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: foodlogiq-quality.getqualityincident
      with:
        incidentId: tools.incidentId
      outputParameters:
      - type: object
        mapping: $.
