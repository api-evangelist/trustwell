meters:
  - name: subscription
    description: Contracted Trustwell subscription line covering the modules selected (Genesis labeling,
      FoodLogiQ supply chain, etc.).
    unit: month
    aggregation: sum
principles:
  - name: Visibility
    description: Visibility is limited to the contracted subscription invoice; Trustwell does not expose
      a public usage or cost API.
  - name: Allocation
    description: Allocate the Trustwell subscription to the food-safety, regulatory affairs, or supply-chain
      function that owns the modules in use.
  - name: Optimization
    description: Optimization happens at renewal — re-scope the module mix (Genesis vs FoodLogiQ vs supplier
      onboarding) against actual usage and audit findings.
  - name: Accountability
    description: A regulatory or supply-chain owner manages the Trustwell relationship; finance approves
      annual renewal terms.
